<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Zone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo">🌿 safe zone</span>
        <p class="sidebar-tagline">you're not alone 🤍</p>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="{{ 'active' if request.path == '/' else '' }}">🏠 Home</a>
        <a href="/feed" class="{{ 'active' if request.path == '/feed' else '' }}">👥 Community</a>
        <a href="/journal" class="{{ 'active' if request.path == '/journal' else '' }}">📓 Journal</a>
        <a href="/mood" class="{{ 'active' if request.path == '/mood' else '' }}">🌱 Garden</a>
        <a href="/wall" class="{{ 'active' if request.path == '/wall' else '' }}">⭐ Wall</a>
        <a href="/support" class="{{ 'active' if request.path == '/support' else '' }}">🛟 Support</a>
        <a href="/account" class="{{ 'active' if request.path == '/account' else '' }}">{{ '👤 Account' }}</a>
      </nav>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
