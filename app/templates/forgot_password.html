{% extends "base.html" %}

{% block content %}
  <div class="card" style="max-width:420px; margin:40px auto;">
    <h1 class="logo" style="margin-bottom:4px;">🌿 reset your password</h1>
    <p class="journal-note">enter the recovery email linked to your account.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

   <form method="POST" action="/welcome/forgot" class="post-form">
      <input type="email" name="email" placeholder="your recovery email" required>
      <button type="submit">send reset link</button>
    </form>

    <a href="/welcome" class="card-link">← back to login</a>
  </div>
{% endblock %}
